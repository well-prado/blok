version: "3.8"

# Cross-Runtime Chain Test Infrastructure
# Runs all SDK runtime containers for end-to-end testing.
#
# Usage:
#   docker compose up -d --build
#   docker compose ps          # wait for all "healthy"
#   docker compose down

services:
  sdk-go:
    build:
      context: ../../../sdks/go
      dockerfile: Dockerfile
    ports:
      - "9001:8080"
    environment:
      PORT: "8080"
      VERSION: "1.0.0"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  sdk-rust:
    build:
      context: ../../../sdks/rust
      dockerfile: Dockerfile
    ports:
      - "9002:8080"
    environment:
      PORT: "8080"
      VERSION: "1.0.0"
      RUST_LOG: info
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  sdk-java:
    build:
      context: ../../../sdks/java
