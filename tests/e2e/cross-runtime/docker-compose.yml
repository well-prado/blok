# Cross-Runtime gRPC E2E Infrastructure
#
# Builds + boots all 7 SDK runtimes in gRPC mode — the transport the runner
# actually uses (HttpRuntimeAdapter was removed in v0.5). Each container serves
# the canonical `blok.runtime.v1.NodeRuntime` service; the spec-b harness drives
# them through the runner's OWN GrpcRuntimeAdapter.
#
# gRPC port convention = HTTP port + 1000 (see sdks/CLAUDE.md): Go 10001,
# Rust 10002, Java 10003, C# 10004, PHP 10005, Ruby 10006, Python3 10007.
# Host ports mirror the container ports so the harness needs no env plumbing.
#
# Usage:
#   docker compose up -d --build
#   bun tests/e2e/cross-runtime/spec-b-typed-e2e.ts   # BLOK_E2E_REQUIRE_ALL=1 in CI
#   docker compose down -v

services:
  sdk-go:
    build:
      context: ../../../sdks/go
    ports:
      - "10001:10001"
    environment:
      BLOK_TRANSPORT: grpc
      GRPC_PORT: "10001"

  sdk-rust:
    build:
      context: ../../../sdks/rust
    ports:
      - "10002:10002"
    environment:
      ENABLE_GRPC: "true"
      GRPC_PORT: "10002"
      RUST_LOG: info

  sdk-java:
    build:
      context: ../../../sdks/java
    ports:
      - "10003:10003"
    environment:
      BLOK_TRANSPORT: grpc
      GRPC_PORT: "10003"

  sdk-csharp:
    build:
      context: ../../../sdks/csharp
    ports:
      - "10004:10004"
    environment:
      BLOK_TRANSPORT: grpc
      GRPC_PORT: "10004"

  sdk-php:
    # gRPC is served by RoadRunner (rr serve) — the image's default CMD.
    build:
      context: ../../../sdks/php
    ports:
      - "10005:10005"
    environment:
      GRPC_PORT: "10005"

  sdk-ruby:
    build:
      context: ../../../sdks/ruby
    ports:
      - "10006:10006"
    environment:
      BLOK_TRANSPORT: grpc
      GRPC_PORT: "10006"

  sdk-python3:
    # The Dockerfile's last stage is `worker` (NATS); the runner needs `runtime`.
    build:
      context: ../../../sdks/python3
      target: runtime
    ports:
      - "10007:10007"
    environment:
      BLOK_TRANSPORT: grpc
      GRPC_PORT: "10007"
