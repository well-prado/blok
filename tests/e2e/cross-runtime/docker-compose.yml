      retries: 10

  sdk-php:
    build:
      context: ../../../sdks/php
      dockerfile: Dockerfile
    ports:
      - "9005:8080"
    environment:
      PORT: "8080"
      VERSION: "1.0.0"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
