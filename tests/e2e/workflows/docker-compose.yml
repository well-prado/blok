services:
  postgres:
    image: postgres
    container_name: blok_e2e_postgres
    restart: unless-stopped
    shm_size: 128mb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: example
      POSTGRES_DB: dvdrental
    ports:
      - "5432:5432"
    volumes:
      - ../../../infra/development/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - ../../../infra/development/:/var/lib/postgresql/bump
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dvdrental"]
      interval: 3s
      timeout: 3s
      retries: 15

  mongodb:
    image: mongo:7
    container_name: blok_e2e_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
