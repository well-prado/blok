version: v2
clean: true
plugins:
  # TypeScript stubs are NOT generated by buf. The runner uses
  # `@grpc/proto-loader` to load runtime.proto at startup; type safety lives
  # in `core/runner/src/adapters/grpc/GrpcCodec.ts` (hand-written wrappers).
  # This avoids a second tooling stack on top of the SDK-side codegen.
  #
  # SDK stubs are generated by their language-native toolchains:
  #   Rust   — `tonic-build` (sdks/rust/build.rs)
  #   Go     — `protoc-gen-go` + `protoc-gen-go-grpc` (Makefile target)
  #   Python — `grpc_tools.protoc` (Makefile target)
  #   Java   — `protobuf-maven-plugin` (sdks/java/pom.xml)
  #   C#     — `Grpc.Tools` MSBuild
  #   Ruby   — `grpc-tools` (Makefile target)
  #   PHP    — `protoc` + `grpc-php-plugin` (Makefile target)
  #
  # Run `make proto` from the repo root to regenerate every SDK's stubs.
inputs:
  - directory: proto
