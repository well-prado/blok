# =============================================================================
# Blok Framework - CircleCI Pipeline
# =============================================================================
# Mirrors the GitHub Actions CI pipeline with CircleCI 2.1 syntax.
# =============================================================================

version: 2.1

# ---------------------------------------------------------------------------
# Orbs
# ---------------------------------------------------------------------------
orbs:
  node: circleci/node@6.1

# ---------------------------------------------------------------------------
# Executors
# ---------------------------------------------------------------------------
executors:
  node-22:
    docker:
      - image: cimg/node:22.0
    resource_class: medium
    working_directory: ~/project
    environment:
      PNPM_VERSION: "10.14.0"
      HUSKY: "0"

  node-22-with-services:
    docker:
      - image: cimg/node:22.0
      - image: redis:7-alpine
        name: redis
      - image: rabbitmq:3.13-management-alpine
        name: rabbitmq
        environment:
          RABBITMQ_DEFAULT_USER: blok
          RABBITMQ_DEFAULT_PASS: blok_test
      - image: nats:2.10-alpine
        name: nats
        command: ["--jetstream", "--http_port", "8222"]
    resource_class: medium
    working_directory: ~/project
    environment:
      PNPM_VERSION: "10.14.0"
      HUSKY: "0"
      REDIS_URL: redis://localhost:6379
      RABBITMQ_URL: amqp://blok:blok_test@localhost:5672
      NATS_URL: nats://localhost:4222

# ---------------------------------------------------------------------------
# Commands (reusable steps)
# ---------------------------------------------------------------------------
commands:
  setup-pnpm:
    description: "Install pnpm and project dependencies"
    steps:
      - run:
          name: Enable Corepack and install pnpm
          command: |
            corepack enable
            corepack prepare pnpm@${PNPM_VERSION} --activate
      - restore_cache:
          name: Restore pnpm store cache
          keys:
            - pnpm-store-v1-{{ checksum "pnpm-lock.yaml" }}
            - pnpm-store-v1-
      - run:
          name: Install dependencies
          command: pnpm install --frozen-lockfile
      - save_cache:
          name: Save pnpm store cache
          key: pnpm-store-v1-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - ~/.local/share/pnpm/store

  wait-for-services:
    description: "Wait for Docker services to be ready"
    steps:
      - run:
          name: Wait for Redis
          command: |
            for i in $(seq 1 30); do
              if redis-cli -h localhost ping 2>/dev/null | grep -q PONG; then
                echo "Redis is ready"
                break
              fi
              echo "Waiting for Redis... ($i/30)"
              sleep 2
            done
      - run:
          name: Wait for RabbitMQ
          command: |
            for i in $(seq 1 30); do
              if curl -sf http://blok:blok_test@localhost:15672/api/healthchecks/node > /dev/null 2>&1; then
                echo "RabbitMQ is ready"
                break
              fi
              echo "Waiting for RabbitMQ... ($i/30)"
              sleep 2
            done
      - run:
          name: Wait for NATS
          command: |
            for i in $(seq 1 30); do
              if curl -sf http://localhost:8222/healthz > /dev/null 2>&1; then
                echo "NATS is ready"
                break
              fi
              echo "Waiting for NATS... ($i/30)"
              sleep 2
            done

# ---------------------------------------------------------------------------
# Jobs
# ---------------------------------------------------------------------------
jobs:
  # --- Lint & Format ---
  lint:
    executor: node-22
    steps:
      - checkout
      - setup-pnpm
      - run:
          name: Run Biome lint
          command: npx biome ci .

  # --- Build & Typecheck ---
  build:
    executor: node-22
    steps:
      - checkout
      - setup-pnpm
      - run:
          name: Build all packages
          command: pnpm run build
      - run:
          name: Typecheck CLI
          command: pnpm --filter nanoctl run typecheck
      - run:
          name: Typecheck Helper
          command: pnpm --filter @nanoservice-ts/helper run typecheck
      - persist_to_workspace:
          root: ~/project
          paths:
            - core/*/dist
            - packages/*/dist
            - triggers/*/dist
            - node_modules

  # --- Runner unit tests ---
  test-runner:
    executor: node-22
    steps:
      - checkout
      - setup-pnpm
      - run:
          name: Build core dependencies
          command: pnpm run core:build:dev
      - run:
          name: Run runner tests
          command: pnpm --filter @nanoservice-ts/runner run test
      - store_test_results:
          path: core/runner/test-results
      - store_artifacts:
          path: core/runner/coverage
          destination: runner-coverage

  # --- CLI tests ---
  test-cli:
    executor: node-22
    steps:
      - checkout
      - setup-pnpm
      - run:
          name: Build CLI and dependencies
          command: pnpm run build:cli
      - run:
          name: Run CLI tests
          command: pnpm run cli:test
      - store_test_results:
          path: packages/cli/test-results
      - store_artifacts:
          path: packages/cli/coverage
          destination: cli-coverage

  # --- Helper tests ---
  test-helper:
    executor: node-22
    steps:
      - checkout
      - setup-pnpm
      - run:
          name: Build core dependencies
          command: pnpm run core:build:dev
      - run:
          name: Run helper tests
          command: pnpm --filter @nanoservice-ts/helper run test
      - store_test_results:
          path: core/helper/test-results
      - store_artifacts:
          path: core/helper/coverage
          destination: helper-coverage

  # --- Trigger tests (parameterized) ---
  test-trigger:
    executor: node-22
    parameters:
      trigger_name:
        type: string
      trigger_filter:
        type: string
    steps:
      - checkout
      - setup-pnpm
      - run:
          name: Build core dependencies
          command: pnpm run core:build:dev
      - run:
          name: Run << parameters.trigger_name >> trigger tests
          command: pnpm --filter << parameters.trigger_filter >> run test
      - store_test_results:
          path: triggers/<< parameters.trigger_name >>/test-results
      - store_artifacts:
          path: triggers/<< parameters.trigger_name >>/coverage
          destination: trigger-<< parameters.trigger_name >>-coverage

  # --- Integration tests (with Docker services) ---
  integration:
    executor: node-22-with-services
    steps:
      - checkout
      - setup-pnpm
      - wait-for-services
      - run:
          name: Build all packages
          command: pnpm run build
      - run:
          name: Run integration tests
          command: pnpm --filter @nanoservice-ts/runner run test:integration
      - store_test_results:
          path: core/runner/test-results
      - store_artifacts:
          path: core/runner/coverage
          destination: integration-coverage

# ---------------------------------------------------------------------------
# Workflows
# ---------------------------------------------------------------------------
workflows:
  ci-pipeline:
    jobs:
      # Lint (no dependencies, runs first)
      - lint

      # Build (no dependencies, runs in parallel with lint)
      - build

      # Test jobs (depend on build)
      - test-runner:
          requires:
            - build

      - test-cli:
          requires:
            - build

      - test-helper:
          requires:
            - build

      # Trigger tests (matrix-style, depend on build)
      - test-trigger:
          name: test-trigger-cron
          trigger_name: cron
          trigger_filter: "@nanoservice-ts/trigger-cron"
          requires:
            - build

      - test-trigger:
          name: test-trigger-webhook
          trigger_name: webhook
          trigger_filter: "@nanoservice-ts/trigger-webhook"
          requires:
            - build

      - test-trigger:
          name: test-trigger-websocket
          trigger_name: websocket
          trigger_filter: "@nanoservice-ts/trigger-websocket"
          requires:
            - build

      - test-trigger:
          name: test-trigger-sse
          trigger_name: sse
          trigger_filter: "@nanoservice-ts/trigger-sse"
          requires:
            - build

      - test-trigger:
          name: test-trigger-queue
          trigger_name: queue
          trigger_filter: "@nanoservice-ts/trigger-queue"
          requires:
            - build

      - test-trigger:
          name: test-trigger-pubsub
          trigger_name: pubsub
          trigger_filter: "@nanoservice-ts/trigger-pubsub"
          requires:
            - build

      # Integration tests (depend on all test jobs, main branch only)
      - integration:
          requires:
            - test-runner
            - test-cli
            - test-helper
            - test-trigger-cron
            - test-trigger-webhook
            - test-trigger-websocket
            - test-trigger-sse
            - test-trigger-queue
            - test-trigger-pubsub
          filters:
            branches:
              only: main
