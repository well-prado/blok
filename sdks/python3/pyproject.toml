[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "blok-nanoservice-python3"
version = "1.0.0"
description = "Blok Nanoservice SDK for Python 3 — build workflow nodes as HTTP microservices"
requires-python = ">=3.10"
license = {text = "MIT"}

[project.scripts]
blok-serve = "bin.serve:main"

[tool.setuptools.packages.find]
include = ["nanoservice*"]
