# =============================================================================
# Blok Framework - GitLab CI/CD Pipeline
# =============================================================================
# Mirrors the GitHub Actions CI pipeline with GitLab CI syntax.
# Uses Docker executor with node:22-alpine as the default image.
# =============================================================================

image: node:22-alpine

stages:
  - lint
  - build
  - test
  - integration
  - deploy

variables:
  PNPM_VERSION: "10.14.0"
  NODE_VERSION: "22"
  # pnpm store directory for caching
  PNPM_STORE_DIR: .pnpm-store
  # Disable husky in CI
  HUSKY: "0"

# ---------------------------------------------------------------------------
# Cache: shared pnpm store across all jobs
# ---------------------------------------------------------------------------
.pnpm-cache: &pnpm-cache
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store/
    policy: pull-push

# ---------------------------------------------------------------------------
# Common setup: install corepack + pnpm + dependencies
# ---------------------------------------------------------------------------
.setup-pnpm: &setup-pnpm
  before_script:
    - corepack enable
    - corepack prepare pnpm@${PNPM_VERSION} --activate
    - pnpm config set store-dir ${PNPM_STORE_DIR}
    - pnpm install --frozen-lockfile

# =============================================================================
# Stage: lint
# =============================================================================
lint:
  stage: lint
  <<: *pnpm-cache
  before_script:
    - corepack enable
    - corepack prepare pnpm@${PNPM_VERSION} --activate
    - pnpm config set store-dir ${PNPM_STORE_DIR}
    - pnpm install --frozen-lockfile
    - npx @biomejs/biome --version || true
  script:
    - npx biome ci .
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH =~ /^feat\//

# =============================================================================
# Stage: build
# =============================================================================
build:
  stage: build
  <<: *pnpm-cache
  <<: *setup-pnpm
  script:
    - pnpm run build
    - pnpm --filter nanoctl run typecheck
    - pnpm --filter @nanoservice-ts/helper run typecheck
  artifacts:
    paths:
      - node_modules/
      - core/*/dist/
      - packages/*/dist/
      - triggers/*/dist/
    expire_in: 1 hour
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH =~ /^feat\//

# =============================================================================
# Stage: test
# =============================================================================

# --- Runner unit tests ---
test-runner:
  stage: test
  <<: *pnpm-cache
  <<: *setup-pnpm
  needs: ["build"]
  script:
    - pnpm run core:build:dev
    - pnpm --filter @nanoservice-ts/runner run test
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH =~ /^feat\//

# --- CLI tests ---
test-cli:
  stage: test
  <<: *pnpm-cache
  <<: *setup-pnpm
  needs: ["build"]
  script:
    - pnpm run build:cli
    - pnpm run cli:test
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH =~ /^feat\//

# --- Workflow helper tests ---
test-helper:
  stage: test
  <<: *pnpm-cache
  <<: *setup-pnpm
  needs: ["build"]
  script:
    - pnpm run core:build:dev
    - pnpm --filter @nanoservice-ts/helper run test
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH =~ /^feat\//

# --- Trigger tests (matrix) ---
test-trigger-cron:
