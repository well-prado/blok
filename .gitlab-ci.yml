    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH =~ /^feat\//

# =============================================================================
# Stage: integration
# =============================================================================
integration:
  stage: integration
  <<: *pnpm-cache
  <<: *setup-pnpm
  needs:
    - test-runner
    - test-cli
    - test-helper
    - test-trigger-cron
    - test-trigger-webhook
    - test-trigger-websocket
    - test-trigger-sse
    - test-trigger-queue
    - test-trigger-pubsub
  services:
    - name: redis:7-alpine
      alias: redis
    - name: rabbitmq:3.13-management-alpine
      alias: rabbitmq
      variables:
        RABBITMQ_DEFAULT_USER: blok
        RABBITMQ_DEFAULT_PASS: blok_test
    - name: nats:2.10-alpine
      alias: nats
      command: ["--jetstream", "--http_port", "8222"]
  variables:
    REDIS_URL: redis://redis:6379
    RABBITMQ_URL: amqp://blok:blok_test@rabbitmq:5672
    NATS_URL: nats://nats:4222
  script:
    - pnpm run build
    - pnpm --filter @nanoservice-ts/runner run test:integration
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# =============================================================================
# Stage: deploy
# =============================================================================
deploy-staging:
  stage: deploy
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  needs:
    - integration
  script:
    - echo "Building Docker image for staging..."
    - docker build -t ${CI_REGISTRY_IMAGE}:staging-${CI_COMMIT_SHORT_SHA} -f dockerfiles/Dockerfile .
    - docker tag ${CI_REGISTRY_IMAGE}:staging-${CI_COMMIT_SHORT_SHA} ${CI_REGISTRY_IMAGE}:staging-latest
    - echo "${CI_REGISTRY_PASSWORD}" | docker login -u "${CI_REGISTRY_USER}" --password-stdin ${CI_REGISTRY}
    - docker push ${CI_REGISTRY_IMAGE}:staging-${CI_COMMIT_SHORT_SHA}
    - docker push ${CI_REGISTRY_IMAGE}:staging-latest
  environment:
    name: staging
    url: https://staging.blok.example.com
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

deploy-production:
  stage: deploy
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  needs:
    - deploy-staging
  script:
    - echo "Building Docker image for production..."
    - docker build -t ${CI_REGISTRY_IMAGE}:${CI_COMMIT_TAG:-${CI_COMMIT_SHORT_SHA}} -f dockerfiles/Dockerfile .
    - docker tag ${CI_REGISTRY_IMAGE}:${CI_COMMIT_TAG:-${CI_COMMIT_SHORT_SHA}} ${CI_REGISTRY_IMAGE}:latest
    - echo "${CI_REGISTRY_PASSWORD}" | docker login -u "${CI_REGISTRY_USER}" --password-stdin ${CI_REGISTRY}
    - docker push ${CI_REGISTRY_IMAGE}:${CI_COMMIT_TAG:-${CI_COMMIT_SHORT_SHA}}
    - docker push ${CI_REGISTRY_IMAGE}:latest
  environment:
    name: production
    url: https://blok.example.com
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: false
