# Alertmanager config (OBS-05 A6).
#
# Routes alerts fired by Prometheus (see rules/blok-alerts.yml). The default
# below just groups + holds alerts (a no-op "null" receiver) so the stack runs
# out of the box. Wire a real receiver (Slack / PagerDuty / email / webhook)
# and point `route.receiver` at it for actual paging.
route:
  # Group alerts by name + workflow so a spike doesn't page per-instance.
  group_by: ["alertname", "workflow_name"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "default"
  routes:
    # Page critical alerts faster.
    - matchers:
        - severity = "critical"
      receiver: "default"
      group_wait: 10s
      repeat_interval: 1h

receivers:
  - name: "default"
    # No-op by default — the stack runs without external secrets. Replace with
    # one of the examples below.
    #
    # slack_configs:
    #   - api_url: "https://hooks.slack.com/services/XXX/YYY/ZZZ"
    #     channel: "#blok-alerts"
    #     title: '{{ .CommonAnnotations.summary }}'
    #     text: '{{ range .Alerts }}{{ .Annotations.description }}\n{{ end }}'
    #
    # pagerduty_configs:
    #   - routing_key: "<integration-key>"
    #
    # webhook_configs:
    #   - url: "http://your-service/alerts"

inhibit_rules:
  # A critical alert silences a matching warning for the same workflow.
  - source_matchers: [severity = "critical"]
    target_matchers: [severity = "warning"]
    equal: ["alertname", "workflow_name"]
