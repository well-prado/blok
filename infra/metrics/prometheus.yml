global:
  scrape_interval: 5s #Scrape interval to every 15 seconds.
  evaluation_interval: 5s #Evaluate rules every 15 seconds.

# OBS-05 A6 — alerting. Load Blok's alert rules and forward firing alerts to
# Alertmanager (added to the metrics docker-compose). Mount the rules dir at
# /etc/prometheus/rules. Without this block, metrics are recorded but nobody
# is ever paged.
rule_files:
  - "/etc/prometheus/rules/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: "blok-http"
    static_configs:
      - targets: ["blok-http:4000"]

  - job_name: "blok-grpc"
    static_configs:
      - targets: ["blok-grpc:9091"]

  # Other triggers expose metrics on BLOK_METRICS_PORT (default 9464)
  - job_name: "blok-triggers"
    static_configs:
      - targets:
          - "blok-websocket:9464"
          - "blok-sse:9464"
          - "blok-cron:9464"
          - "blok-queue:9464"
          - "blok-pubsub:9464"
          - "blok-webhook:9464"
          - "blok-worker:9464"

  # Uncomment for file-based service discovery in dynamic environments
  # - job_name: "blok-dynamic"
  #   file_sd_configs:
  #     - files:
  #         - "/etc/prometheus/blok-targets.json"
  #       refresh_interval: 30s