# Blok Production Docker Compose
#
# Full production stack with all services, monitoring, and scaling.
#
# Usage:
#   docker compose -f infra/docker-compose.production.yml up -d
#   docker compose -f infra/docker-compose.production.yml --profile monitoring up -d
#   docker compose -f infra/docker-compose.production.yml --profile full up -d

services:
  # ─── Blok Application ──────────────────────────────────
  blok:
    build:
      context: ..
      dockerfile: dockerfiles/Dockerfile.deploy.http
    ports:
      - "${PORT:-4000}:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      WORKFLOWS_PATH: /app/workflows
      NODES_PATH: /app/src/nodes
      CONSOLE_LOG_ACTIVE: "false"
      APP_NAME: blok-production
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://blok:${RABBITMQ_PASSWORD:-blok_prod}@rabbitmq:5672
      NATS_URL: nats://nats:4222
      PROMETHEUS_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      replicas: ${BLOK_REPLICAS:-3}
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    networks:
      - blok-net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ─── Redis ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    networks:
      - blok-net

  # ─── RabbitMQ ───────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: blok
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-blok_prod}
      RABBITMQ_VM_MEMORY_HIGH_WATERMARK: 0.6
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    networks:
      - blok-net

  # ─── NATS ──────────────────────────────────────────────
  nats:
    image: nats:2.10-alpine
    command: >
      -js
      -sd /data
      -m 8222
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    networks:
      - blok-net

  # ─── Nginx Reverse Proxy ───────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      blok:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    networks:
      - blok-net

  # ─── Monitoring Stack (profile: monitoring) ─────────────
  prometheus:
    image: prom/prometheus:v2.50.0
    profiles: ["monitoring", "full"]
    ports:
      - "9090:9090"
    volumes:
      - ./metrics/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    networks:
      - blok-net

  grafana:
    image: grafana/grafana:10.3.0
    profiles: ["monitoring", "full"]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-clock-panel
    volumes:
      - ./metrics/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./metrics/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    networks:
      - blok-net

  loki:
    image: grafana/loki:2.9.0
    profiles: ["monitoring", "full"]
    ports:
      - "3100:3100"
    volumes:
      - ./metrics/loki-config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/config.yaml
    networks:
      - blok-net

  tempo:
    image: grafana/tempo:2.3.0
    profiles: ["monitoring", "full"]
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./metrics/tempo.yaml:/etc/tempo/config.yaml:ro
      - tempo-data:/var/tempo
    command: -config.file=/etc/tempo/config.yaml
    networks:
      - blok-net

volumes:
  redis-data:
  rabbitmq-data:
  nats-data:
  prometheus-data:
  grafana-data:
  loki-data:
  tempo-data:

networks:
  blok-net:
    driver: bridge
