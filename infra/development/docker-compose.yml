services:
  postgres:
    image: postgres
    container_name: postgres
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: example
    ports:
      - 5432:5432
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql # DB dvdrental
      - ./:/var/lib/postgresql/bump
    networks:
      - shared-network

  adminer:
    image: adminer
    container_name: adminer
    restart: always
    ports:
      - 8080:8080
    networks:
      - shared-network

  # Redis for Queue trigger (BullMQ)
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    ports:
      - 6379:6379
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - shared-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Commander - Web UI for Redis (optional, useful for debugging)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis-commander
    restart: always
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - 8081:8081
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - shared-network

networks:
  shared-network:
    external: true

volumes:
  redis-data:

# Setup:
# 1. Create the network: docker network create shared-network
# 2. Start all services: docker compose up -d
# 3. Start only specific services: docker compose up -d redis redis-commander
#
# Services:
# - PostgreSQL: localhost:5432 (user: postgres, password: example)
# - Adminer (DB UI): http://localhost:8080
# - Redis: localhost:6379 (no password)
# - Redis Commander (Redis UI): http://localhost:8081
#
# Queue trigger env vars (already defaults):
# - REDIS_HOST=localhost
# - REDIS_PORT=6379