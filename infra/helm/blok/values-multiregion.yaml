# Multi-Region Helm Values for Blok
# Override default values.yaml for multi-region deployments
#
# Usage:
#   helm install blok ./infra/helm/blok -f ./infra/helm/blok/values-multiregion.yaml

replicaCount: 3

image:
  repository: ghcr.io/deskree/blok
  tag: latest
  pullPolicy: IfNotPresent

# ─── Multi-Region Pod Topology ────────────────────────────
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: blok

# ─── Pod Anti-Affinity (spread across nodes) ─────────────
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: blok
          topologyKey: kubernetes.io/hostname

# ─── Horizontal Pod Autoscaler ────────────────────────────
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
        - type: Pods
          value: 4
          periodSeconds: 60
      selectPolicy: Max

# ─── Resource Limits ──────────────────────────────────────
resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi

# ─── Vertical Pod Autoscaler ─────────────────────────────
vpa:
  enabled: true
  updateMode: Auto
  minAllowed:
    cpu: 250m
    memory: 256Mi
  maxAllowed:
    cpu: 4000m
    memory: 4Gi

# ─── Pod Disruption Budget ────────────────────────────────
podDisruptionBudget:
  enabled: true
  minAvailable: 2

# ─── Health Checks ────────────────────────────────────────
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 2

startupProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 30

# ─── Service ──────────────────────────────────────────────
service:
  type: ClusterIP
  port: 4000
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"

# ─── Ingress ─────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
  hosts:
    - host: blok.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: blok-tls
      hosts:
        - blok.example.com

# ─── Monitoring ───────────────────────────────────────────
# serviceMonitor lives UNDER monitoring — the chart's servicemonitor.yaml reads
# .Values.monitoring.serviceMonitor.*, so a top-level serviceMonitor block never
# took effect (the ServiceMonitor silently never rendered).
monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 15s
    scrapeTimeout: 10s
    path: /metrics
    labels:
      release: prometheus

# ─── Environment ──────────────────────────────────────────
env:
  - name: NODE_ENV
    value: production
  - name: PORT
    value: "4000"
  - name: CONSOLE_LOG_ACTIVE
    value: "false"
  - name: OTEL_EXPORTER_OTLP_ENDPOINT
    value: "http://tempo.monitoring:4318"
  - name: PROMETHEUS_ENABLED
    value: "true"
  - name: SENTRY_DSN
    valueFrom:
      secretKeyRef:
        name: blok-secrets
        key: sentry-dsn

# ─── Network Policies ────────────────────────────────────
networkPolicy:
  enabled: true
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 4000
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
      ports:
        - protocol: TCP
          port: 4000
  egress:
    - to: []
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 5672
        - protocol: TCP
          port: 4222
