<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title><%= title %></title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #0b0d12;
    --panel: #14171f;
    --border: #232a36;
    --text: #e6e9ef;
    --muted: #8a91a0;
    --accent: #7c5cff;
    --user-bubble: #2a3144;
    --asst-bubble: #161a24;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  header h1 { margin: 0; font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
  header .muted { color: var(--muted); font-size: 12px; }
  header .status { margin-left: auto; font-size: 12px; color: var(--muted); }
  header .status .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #6b7280; margin-right: 6px; vertical-align: 1px; }
  header .status.connected .dot { background: #10b981; }
  main {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-width: 760px;
    width: 100%;
    margin: 0 auto;
  }
  .msg { padding: 10px 14px; border-radius: 12px; max-width: 80%; line-height: 1.45; white-space: pre-wrap; word-wrap: break-word; }
  .msg.user { align-self: flex-end; background: var(--user-bubble); }
  .msg.assistant { align-self: flex-start; background: var(--asst-bubble); border: 1px solid var(--border); }
  .msg.assistant.streaming::after { content: "▍"; color: var(--accent); margin-left: 2px; animation: pulse 1s infinite; }
  @keyframes pulse { 50% { opacity: 0.3; } }
  .empty { color: var(--muted); text-align: center; margin: 60px 0; font-size: 14px; }
  footer {
    border-top: 1px solid var(--border);
    padding: 12px 20px;
    background: var(--panel);
  }
  .composer { max-width: 760px; margin: 0 auto; display: flex; gap: 10px; align-items: flex-end; }
  textarea {
    flex: 1;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    font: inherit;
    resize: none;
    min-height: 44px;
    max-height: 200px;
    outline: none;
  }
  textarea:focus { border-color: var(--accent); }
  button {
    background: var(--accent);
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 10px;
    font: inherit;
    font-weight: 500;
    cursor: pointer;
    height: 44px;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>
<header>
  <h1><%= title %></h1>
  <span class="muted">SSE + LLM streaming demo</span>
  <span class="status" id="status"><span class="dot"></span><span id="status-text">connecting…</span></span>
</header>
<main id="messages">
  <div class="empty" id="empty">Say hi to kick off a streaming chat. Tokens arrive over SSE from the Blok bus.</div>
</main>
<footer>
  <form class="composer" id="composer">
    <textarea id="input" placeholder="Type a message and press Enter…" rows="1"></textarea>
    <button type="submit" id="send">Send</button>
  </form>
</footer>
<script>
(function () {
  const ENDPOINT_BASE = <%- JSON.stringify(endpointBase) %>;
  const PERSIST_SESSION = <%- persistSession ? "true" : "false" %>;
  const BODY_MODE = <%- JSON.stringify(bodyMode) %>;
  const SESSION_STORAGE_KEY = "blok-chat-session:" + ENDPOINT_BASE;
  function newSessionId() {
    return (crypto.randomUUID && crypto.randomUUID()) || ("s-" + Math.random().toString(36).slice(2));
  }
  let sessionId;
  if (PERSIST_SESSION) {
    try {
      sessionId = localStorage.getItem(SESSION_STORAGE_KEY) || newSessionId();
      localStorage.setItem(SESSION_STORAGE_KEY, sessionId);
    } catch { sessionId = newSessionId(); }
  } else {
    sessionId = newSessionId();
  }
  const messagesEl = document.getElementById("messages");
  const emptyEl = document.getElementById("empty");
  const inputEl = document.getElementById("input");
  const sendBtn = document.getElementById("send");
  const composer = document.getElementById("composer");
  const statusEl = document.getElementById("status");
  const statusText = document.getElementById("status-text");

  // running conversation history; sent in full on every POST so the
  // LLM sees prior turns. Production code would persist this server-side.
  const history = [];
  let activeAssistantEl = null;

  function appendMessage(role, content) {
    if (emptyEl) emptyEl.remove();
    const el = document.createElement("div");
    el.className = "msg " + role;
    el.textContent = content;
    messagesEl.appendChild(el);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return el;
  }

  function setStatus(connected, label) {
    statusEl.classList.toggle("connected", !!connected);
    statusText.textContent = label;
  }

  // Open EventSource — receives streamed tokens for THIS session
  const es = new EventSource("/sse" + ENDPOINT_BASE + "/" + sessionId);
  es.addEventListener("open", () => setStatus(true, "connected"));
  es.addEventListener("error", () => setStatus(false, "reconnecting…"));
  es.addEventListener("token", (ev) => {
    try {
      const { delta } = JSON.parse(ev.data);
      if (!activeAssistantEl) {
        activeAssistantEl = appendMessage("assistant", "");
        activeAssistantEl.classList.add("streaming");
      }
      activeAssistantEl.textContent += delta;
      messagesEl.scrollTop = messagesEl.scrollHeight;
    } catch (e) { console.error("bad token frame:", ev.data); }
  });
  es.addEventListener("done", (ev) => {
    if (activeAssistantEl) {
      activeAssistantEl.classList.remove("streaming");
      try {
        const { fullText } = JSON.parse(ev.data);
        if (typeof fullText === "string") {
          activeAssistantEl.textContent = fullText;
          history.push({ role: "assistant", content: fullText });
        }
      } catch {}
      activeAssistantEl = null;
    }
    sendBtn.disabled = false;
    inputEl.focus();
  });

  async function send(text) {
    if (!text.trim()) return;
    history.push({ role: "user", content: text });
    appendMessage("user", text);
    inputEl.value = "";
    inputEl.style.height = "auto";
    sendBtn.disabled = true;
    try {
      const body = BODY_MODE === "message"
        ? { message: text }
        : { messages: history };
      const res = await fetch(ENDPOINT_BASE + "/" + sessionId + "/message", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      if (!res.ok) {
        const err = await res.text();
        appendMessage("assistant", "[error] " + err.slice(0, 200));
        sendBtn.disabled = false;
      }
    } catch (e) {
      appendMessage("assistant", "[network error] " + e.message);
      sendBtn.disabled = false;
    }
  }

  composer.addEventListener("submit", (ev) => {
    ev.preventDefault();
    send(inputEl.value);
  });
  inputEl.addEventListener("keydown", (ev) => {
    if (ev.key === "Enter" && !ev.shiftKey) {
      ev.preventDefault();
      send(inputEl.value);
    }
  });
  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(200, inputEl.scrollHeight) + "px";
  });
  inputEl.focus();
})();
</script>
</body>
</html>
