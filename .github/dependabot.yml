version: 2

updates:
  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "automated"
    groups:
      typescript:
        patterns: ["typescript", "@types/*"]
      testing:
        patterns: ["vitest", "@vitest/*", "stryker*", "@stryker-mutator/*"]
      linting:
        patterns: ["@biomejs/*", "biome"]
      build:
        patterns: ["nx", "esbuild", "tsup", "typedoc*"]
    ignore:
      # Avoid major version bumps automatically
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "ci"
      - "automated"

  # Docker
  - package-ecosystem: "docker"
    directory: "/dockerfiles"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "docker"
      - "automated"

  # Python (runtime)
  - package-ecosystem: "pip"
    directory: "/runtimes/python3"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "python"
      - "automated"

  # Go SDK
  - package-ecosystem: "gomod"
    directory: "/sdks/go"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "go"
      - "automated"

  # Rust SDK
  - package-ecosystem: "cargo"
    directory: "/sdks/rust"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "rust"
      - "automated"

  # Java SDK
  - package-ecosystem: "maven"
    directory: "/sdks/java"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "java"
      - "automated"

  # C# SDK
  - package-ecosystem: "nuget"
    directory: "/sdks/csharp"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "csharp"
      - "automated"

  # Helm charts
  - package-ecosystem: "docker"
    directory: "/infra/helm/blok"
    schedule:
      interval: "monthly"
    labels:
      - "helm"
      - "automated"
