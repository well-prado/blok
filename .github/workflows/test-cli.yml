name: CLI Tests

on:
  pull_request:
    branches:
      - main
    paths:
      - 'packages/cli/**'
      - 'core/**'
      - '.github/workflows/test-cli.yml'
  push:
    branches:
      - main
    paths:
      - 'packages/cli/**'
      - 'core/**'
      - '.github/workflows/test-cli.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build:cli

      - name: Run CLI tests
        run: pnpm run cli:test
