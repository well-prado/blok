name: CI Pipeline

on:
  push:
    branches: [main, 'feat/**']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.14.0'

jobs:
  # ─── Lint & Format ────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: latest

      - name: Run Biome
        run: biome ci .

  # ─── TypeScript Build ─────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm run build

      - name: Typecheck CLI
        run: pnpm --filter nanoctl run typecheck

      - name: Typecheck Helper
        run: pnpm --filter @nanoservice-ts/helper run typecheck

  # ─── Unit Tests: Core Runner ──────────────────────────────
  test-runner:
    name: Test Runner
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core dependencies
        run: pnpm run core:build:dev

      - name: Run runner tests
        run: pnpm --filter @nanoservice-ts/runner run test

  # ─── Unit Tests: CLI ──────────────────────────────────────
  test-cli:
    name: Test CLI
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI and dependencies
        run: pnpm run build:cli

      - name: Run CLI tests
        run: pnpm run cli:test

  # ─── Unit Tests: Workflow Helper ──────────────────────────
  test-helper:
    name: Test Helper
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core dependencies
        run: pnpm run core:build:dev

      - name: Run helper tests
        run: pnpm --filter @nanoservice-ts/helper run test

  # ─── Unit Tests: Triggers ─────────────────────────────────
  test-triggers:
    name: Test Triggers
    runs-on: ubuntu-latest
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        trigger:
          - { name: 'cron', filter: '@nanoservice-ts/trigger-cron' }
          - { name: 'webhook', filter: '@nanoservice-ts/trigger-webhook' }
          - { name: 'websocket', filter: '@nanoservice-ts/trigger-websocket' }
          - { name: 'sse', filter: '@nanoservice-ts/trigger-sse' }
          - { name: 'queue', filter: '@nanoservice-ts/trigger-queue' }
          - { name: 'pubsub', filter: '@nanoservice-ts/trigger-pubsub' }
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core dependencies
        run: pnpm run core:build:dev

      - name: Run ${{ matrix.trigger.name }} trigger tests
        run: pnpm --filter ${{ matrix.trigger.filter }} run test

  # ─── Integration Tests (Docker Services) ──────────────────
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test-runner, test-cli, test-triggers]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:3.13-management-alpine
        ports:
          - 5673:5672
          - 15673:15672
        env:
          RABBITMQ_DEFAULT_USER: blok
          RABBITMQ_DEFAULT_PASS: blok_test
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 5

      nats:
        image: nats:2.10-alpine
        ports:
          - 4223:4222
          - 8223:8222
        options: >-
          --health-cmd "wget --spider -q http://localhost:8222/healthz || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm run build

      - name: Run integration tests
        run: pnpm --filter @nanoservice-ts/runner run test:integration
        env:
          REDIS_URL: redis://localhost:6380
          RABBITMQ_URL: amqp://blok:blok_test@localhost:5673
          NATS_URL: nats://localhost:4223

  # ─── Summary ──────────────────────────────────────────────
  ci-passed:
    name: CI Passed
    runs-on: ubuntu-latest
    needs: [lint, build, test-runner, test-cli, test-helper, test-triggers]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "❌ Lint failed"
            exit 1
          fi
          if [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "❌ Build failed"
            exit 1
          fi
          if [[ "${{ needs.test-runner.result }}" != "success" ]]; then
            echo "❌ Runner tests failed"
            exit 1
          fi
          if [[ "${{ needs.test-cli.result }}" != "success" ]]; then
            echo "❌ CLI tests failed"
            exit 1
          fi
          if [[ "${{ needs.test-helper.result }}" != "success" ]]; then
            echo "❌ Helper tests failed"
            exit 1
          fi
          if [[ "${{ needs.test-triggers.result }}" != "success" ]]; then
            echo "❌ Trigger tests failed"
            exit 1
          fi
          echo "✅ All CI checks passed!"
