name: Integration tests

on:
  # Skip the heavy suite for changes that can't affect the TypeScript under test
  # (docs, markdown, Helm chart, Grafana/Prometheus infra). A PR touching ONLY
  # these never starts a runner — e.g. a Helm-only PR no longer burns 8 minutes.
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'infra/helm/**'
      - 'infra/metrics/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'infra/helm/**'
      - 'infra/metrics/**'
      - 'LICENSE'
  workflow_dispatch:

# Cancel an in-flight run when a newer commit lands on the same branch/PR — don't
# pay Actions minutes for a SHA you've already superseded. Run the full job
# locally first with `bun run ci` to avoid pushing a known-red SHA at all.
concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  integration:
    name: Integration tests (real brokers + backends)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (Biome)
        run: bun run lint:check

      # Single source of truth for the gRPC contract: every SDK + runner copy of
      # runtime.proto must match the canonical proto/blok/runtime/v1/runtime.proto.
      # A drifted copy silently breaks one runtime — fail the PR instead.
      - name: Proto drift check
        run: bun run proto:check

      - name: Bring up test fixtures
        run: docker compose -f infra/testing/docker-compose.yml up -d
          postgres redis nats kafka rabbitmq localstack gcp-pubsub-emulator

      - name: Wait for services to be healthy
        run: |
          set -e
          deadline=$(( $(date +%s) + 120 ))
          while [ "$(date +%s)" -lt "$deadline" ]; do
            unhealthy=$(docker compose -f infra/testing/docker-compose.yml ps --format json | \
              grep -E '"Health":\s*"(starting|unhealthy)"' | wc -l | tr -d ' ' || echo "0")
            if [ "$unhealthy" = "0" ]; then
              echo "All services healthy."
              exit 0
            fi
            echo "Waiting for $unhealthy service(s)..."
            sleep 3
          done
          echo "Healthcheck timeout — printing status:"
          docker compose -f infra/testing/docker-compose.yml ps
          exit 1

      - name: Build all workspace packages
        # Use nx run-many -t build so every package's dist/ exists before
        # tests run. Required because trigger-http's index.ts imports
        # @blokjs/trigger-websocket / @blokjs/trigger-sse / @blokjs/trigger-webhook
        # (and similar transitive imports across blokctl, nodes, etc.).
        # Without this each downstream package fails to resolve sibling
        # entries at test time.
        run: bunx nx run-many -t build

      # Informational only — never gates the merge (continue-on-error). Prints
      # current coverage for the framework packages that have honest, current-
      # state thresholds in their vitest config. Ratchet those floors up as
      # coverage improves. worker/pubsub coverage belongs in a broker lane.
      - name: Coverage report (non-gating)
        continue-on-error: true
        run: bunx nx run-many -t test -p @blokjs/runner @blokjs/shared @blokjs/trigger-grpc @blokjs/trigger-sse @blokjs/trigger-websocket -- --coverage

      - name: Run integration tests
        env:
          BLOK_INTEGRATION_REDIS_URL: redis://localhost:6380
          BLOK_INTEGRATION_NATS_SERVERS: nats://localhost:4223
          BLOK_INTEGRATION_KAFKA_BROKERS: localhost:9094
          BLOK_INTEGRATION_RABBITMQ_URL: amqp://blok:blok_test@localhost:5673
          BLOK_INTEGRATION_POSTGRES_URL: postgres://blok:blok_test@localhost:5433/blok_test
          # LocalStack credentials — any value satisfies the SDK's signer.
          BLOK_INTEGRATION_SQS_ENDPOINT: http://localhost:4567
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          # GCP Pub/Sub emulator (Phase 2.1 #5).
          BLOK_INTEGRATION_GCP_PUBSUB_ENDPOINT: localhost:8086
          PUBSUB_EMULATOR_HOST: localhost:8086
          PUBSUB_PROJECT_ID: blok-test
          GOOGLE_CLOUD_PROJECT: blok-test
        run: bun run test

      - name: Print compose logs on failure
        if: failure()
        run: docker compose -f infra/testing/docker-compose.yml logs --tail=200

      - name: Tear down test fixtures
        if: always()
        run: docker compose -f infra/testing/docker-compose.yml down -v
